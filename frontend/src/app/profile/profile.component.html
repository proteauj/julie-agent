<div class="profile-page page" *ngIf="loaded">
  <section class="card">
    <h2>{{ 'PROFILE.TITLE' | translate }}</h2>

    <form class="profile-form grid" (ngSubmit)="save()">
      <div>
        <label for="email">{{ 'PROFILE.EMAIL' | translate }} :</label>
        <input
          id="email"
          [(ngModel)]="user.email"
          name="email"
          type="email"
          required
        />
      </div>

      <div>
        <label for="nom">{{ 'PROFILE.NAME' | translate }} :</label>
        <input
          id="nom"
          [(ngModel)]="user.nom"
          name="nom"
          type="text"
        />
      </div>

      <div>
        <label for="phone">Téléphone :</label>
        <input
          id="phone"
          [(ngModel)]="user.phone"
          name="phone"
          type="tel"
        />
      </div>

      <div>
        <label for="notificationPreference">Préférence rappel :</label>
        <select
          id="notificationPreference"
          [(ngModel)]="user.notificationPreference"
          name="notificationPreference"
        >
          <option value="sms">SMS</option>
          <option value="email">Email</option>
          <option value="both">Les deux</option>
        </select>
      </div>

      <div>
        <label for="langue">{{ 'PROFILE.LANGUA' | translate }} :</label>
        <select
          id="langue"
          [(ngModel)]="user.languePreferree"
          name="langue"
        >
          <option value="fr">Français</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit">{{ 'CHAT.SEND' | translate }}</button>
      </div>
    </form>

    <p class="error" *ngIf="error">{{ error }}</p>
  </section>
</div>
