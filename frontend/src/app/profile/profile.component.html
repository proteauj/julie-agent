<div class="profile-page page" *ngIf="loaded">
  <section class="card">
    <h2>{{ 'PROFILE.TITLE' | translate }}</h2>

    <form class="profile-form grid" (ngSubmit)="save()">
      <div>
        <label for="email">{{ 'PROFILE.EMAIL' | translate }} :</label>
        <input
          id="email"
          [(ngModel)]="user.email"
          name="email"
          type="email"
          required
        />
      </div>

      <div>
        <label for="nom">{{ 'PROFILE.NAME' | translate }} :</label>
        <input
          id="nom"
          [(ngModel)]="user.nom"
          name="nom"
          type="text"
        />
      </div>

      <div>
        <label for="phone">{{ 'PROFILE.PHONE' | translate }} :</label>
        <input
          id="phone"
          [(ngModel)]="user.phone"
          name="phone"
          type="tel"
        />
      </div>

      <div>
        <label for="notificationPreference">{{ 'PROFILE.REMINDER_PREFERENCE' | translate }} :</label>
        <select
          id="notificationPreference"
          [(ngModel)]="user.notificationPreference"
          name="notificationPreference"
        >
          <option value="sms">{{ 'COMMON.SMS' | translate }}</option>
          <option value="email">{{ 'COMMON.EMAIL' | translate }}</option>
          <option value="both">{{ 'COMMON.BOTH' | translate }}</option>
        </select>
      </div>

      <div>
        <label for="langue">{{ 'PROFILE.LANGUA' | translate }} :</label>
        <select
          id="langue"
          [(ngModel)]="user.languePreferree"
          name="langue"
        >
          <option value="fr">{{ 'PROFILE.LANG_FR' | translate }}</option>
          <option value="en">{{ 'PROFILE.LANG_EN' | translate }}</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="submit">{{ 'CHAT.SEND' | translate }}</button>
      </div>
    </form>

    <p class="error" *ngIf="error">{{ error }}</p>
  </section>
</div>
