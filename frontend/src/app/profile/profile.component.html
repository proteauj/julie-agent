<div class="profile" *ngIf="loaded">
  <h2>{{ 'PROFILE.TITLE' | translate }}</h2>
  <form (ngSubmit)="save()">
    <div>
      <label>{{ 'PROFILE.EMAIL' | translate }} : </label>
      <input [(ngModel)]="user.email" name="email" required>
    </div>
    <div>
      <label>{{ 'PROFILE.NAME' | translate }} : </label>
      <input [(ngModel)]="user.nom" name="nom">
    </div>
    <div>
        <label>Téléphone : </label>
        <input [(ngModel)]="user.phone" name="phone" type="tel">
    </div>
    <div>
        <label>Préférence rappel : </label>
        <select [(ngModel)]="user.notificationPreference" name="notificationPreference">
            <option value="sms">SMS</option>
            <option value="email">Email</option>
        </select>
    </div>
    <div>
      <label>{{ 'PROFILE.LANGUA' | translate }} : </label>
      <select [(ngModel)]="user.languePreferree" name="langue">
        <option value="fr">Français</option>
        <option value="en">English</option>
      </select>
    </div>
    <button>{{ 'CHAT.SEND' | translate }}</button>
  </form>
  <div *ngIf="error" style="color:red">{{ error }}</div>
</div>
