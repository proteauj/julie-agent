<div class="chat-page page">
  <section class="card">
    <h2>Parler à l’agent</h2>

    <div class="messages">
      <div
        *ngFor="let message of messages"
        class="message"
        [ngClass]="message.role"
      >
        {{ message.content }}
      </div>
    </div>
  </section>

  <section class="card">
    <div class="chat-form">
      <textarea
        [(ngModel)]="input"
        placeholder="Écris ton message..."
      ></textarea>

      <div class="form-actions">
        <button (click)="send()" [disabled]="loading || !input.trim()">
          Envoyer
        </button>
      </div>
    </div>
  </section>
</div>
