<div class="chat-page page">
  <section class="card">
    <h2>{{ 'CHAT.TITLE' | translate }}</h2>

    <div class="messages">
      <div
        *ngFor="let message of messages"
        class="message"
        [ngClass]="message.role"
      >
        <strong>
          {{ message.role === 'user' ? 'Moi' : 'Aline' }} :
        </strong>
        <div class="content">
          {{ message.content }}
        </div>
      </div>

      <!-- 🔄 loading -->
      <div *ngIf="loading" class="message assistant">
        <em>...</em>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="chat-form">
      <textarea
        [(ngModel)]="input"
        [placeholder]="'CHAT.PLACEHOLDER' | translate"
        rows="3"
      ></textarea>

      <div class="form-actions">
        <button
          (click)="send()"
          [disabled]="loading || !input.trim()"
        >
          {{ 'CHAT.SEND' | translate }}
        </button>
      </div>
    </div>
  </section>
</div>
