<div class="container">
  <nav class="top-nav">
    <a routerLink="/chat">Chat</a>
    <a routerLink="/profil" *ngIf="isLogged$ | async">Profil</a>
    <a routerLink="/admin" *ngIf="(currentUser$ | async)?.role === 'admin'">Admin</a>
    <a routerLink="/agenda" *ngIf="isLogged$ | async">Agenda</a>

    <span class="spacer"></span>

    <button type="button" (click)="switchLang('fr')">FR</button>
    <button type="button" (click)="switchLang('en')">EN</button>

    <a routerLink="/login" *ngIf="!(isLogged$ | async)">Connexion</a>
    <button type="button" *ngIf="isLogged$ | async" (click)="logout()">Déconnexion</button>
  </nav>

  <router-outlet></router-outlet>
</div>
