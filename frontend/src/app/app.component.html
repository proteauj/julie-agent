<div class="app-shell">
  <header class="senior-header">
    <a routerLink="/home" class="brand">
      <img src="assets/aline-logo.png" alt="Logo Aline Écoute" />
      <div>
        <strong>{{ 'APP.NAME' | translate }}</strong>
        <span>{{ 'APP.TAGLINE' | translate }}</span>
      </div>
    </a>
  </header>

  <main class="container">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav">
    <a routerLink="/home" class="icon-header-button" [title]="'NAV.HOME' | translate">
      🏠
    </a>

    <button type="button" class="icon-header-button" (click)="switchLang('fr')">FR</button>
    <button type="button" class="icon-header-button" (click)="switchLang('en')">EN</button>

    <a routerLink="/login" *ngIf="!(isLogged$ | async)" class="icon-header-button">
      🔐
    </a>

    <button
      type="button"
      *ngIf="isLogged$ | async"
      class="icon-header-button logout"
      (click)="logout()"
    >
      ⏻
    </button>
  </nav>
</div>
