<div class="app-shell">
  <header class="senior-header">
    <a routerLink="/home" class="brand">
      <img src="assets/aline-logo.png" alt="Logo Aline Écoute" />
      <div>
        <strong>{{ 'APP.NAME' | translate }}</strong>
        <span>{{ 'APP.TAGLINE' | translate }}</span>
      </div>
    </a>

    <span class="spacer"></span>

    <button class="icon-header-button" (click)="goBack()" aria-label="Retour">←</button>
    <a routerLink="/home" class="icon-header-button" aria-label="Accueil">🏠</a>

    <button type="button" class="lang-button" (click)="switchLang('fr')">
      {{ 'LANG.FR' | translate }}
    </button>

    <button type="button" class="lang-button" (click)="switchLang('en')">
      {{ 'LANG.EN' | translate }}
    </button>

    <a routerLink="/login" *ngIf="!(isLogged$ | async)" class="header-button">
      {{ 'NAV.LOGIN' | translate }}
    </a>

    <button
      type="button"
      *ngIf="isLogged$ | async"
      class="icon-header-button logout"
      (click)="logout()"
      aria-label="Déconnexion"
      title="{{ 'NAV.LOGOUT' | translate }}"
    >
      ⏻
    </button>
  </header>

  <main class="container">
    <router-outlet></router-outlet>
  </main>
</div>
