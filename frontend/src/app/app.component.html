<div class="app-shell">
  <header class="senior-header">
    <a routerLink="/home" class="brand">
      <img src="assets/aline-logo.png" alt="Logo Aline Écoute" />
      <div>
        <strong>{{ 'APP.NAME' | translate }}</strong>
        <span>{{ 'APP.TAGLINE' | translate }}</span>
      </div>
    </a>
  </header>

  <main class="container">
    <router-outlet></router-outlet>
  </main>

  <nav class="bottom-nav">
    <a routerLink="/home" class="bottom-nav-button" [title]="'NAV.HOME' | translate">
      <span class="bottom-nav-icon">🏠</span>
      <span class="bottom-nav-label">{{ 'NAV.HOME' | translate }}</span>
    </a>

    <button type="button" class="bottom-nav-button" (click)="switchLang('fr')">
      <span class="bottom-nav-icon">FR</span>
      <span class="bottom-nav-label">{{ 'LANG.FR' | translate }}</span>
    </button>

    <button type="button" class="bottom-nav-button" (click)="switchLang('en')">
      <span class="bottom-nav-icon">EN</span>
      <span class="bottom-nav-label">{{ 'LANG.EN' | translate }}</span>
    </button>

    <button
      type="button"
      *ngIf="isLogged$ | async"
      class="bottom-nav-button logout"
      (click)="logout()"
    >
      <span class="bottom-nav-icon">⏻</span>
      <span class="bottom-nav-label">{{ 'NAV.LOGOUT' | translate }}</span>
    </button>
  </nav>
</div>
