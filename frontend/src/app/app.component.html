<div class="container">
  <nav class="top-nav">
    <a routerLink="/chat">{{ 'NAV.CHAT' | translate }}</a>
    <a routerLink="/agenda" *ngIf="isLogged$ | async">{{ 'NAV.AGENDA' | translate }}</a>
    <a routerLink="/reminders" *ngIf="isLogged$ | async">{{ 'NAV.REMINDERS' | translate }}</a>
    <a routerLink="/activities" *ngIf="isLogged$ | async">{{ 'NAV.ACTIVITIES' | translate }}</a>
    <a routerLink="/profil" *ngIf="isLogged$ | async">{{ 'NAV.PROFILE' | translate }}</a>
    <a routerLink="/admin" *ngIf="(currentUser$ | async)?.role === 'admin'">{{ 'NAV.ADMIN' | translate }}</a>

    <span class="spacer"></span>

    <button type="button" (click)="switchLang('fr')">FR</button>
    <button type="button" (click)="switchLang('en')">EN</button>

    <a routerLink="/login" *ngIf="!(isLogged$ | async)">{{ 'NAV.LOGIN' | translate }}</a>
    <button type="button" *ngIf="isLogged$ | async" (click)="logout()">
      {{ 'NAV.LOGOUT' | translate }}
    </button>
  </nav>

  <router-outlet></router-outlet>
</div>
