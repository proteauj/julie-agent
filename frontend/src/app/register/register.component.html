<div class="auth-page page">
  <section class="card">
    <h2>Créer un compte</h2>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="success" *ngIf="success">{{ success }}</p>

    <div class="auth-form grid">
      <input [(ngModel)]="nom" type="text" placeholder="Nom" />
      <input [(ngModel)]="email" type="email" placeholder="Email" />
      <input [(ngModel)]="password" type="password" placeholder="Mot de passe" />
    </div>

    <div class="form-actions">
      <button (click)="register()">Créer le compte</button>
    </div>

    <a routerLink="/login">J’ai déjà un compte</a>
  </section>
</div>
