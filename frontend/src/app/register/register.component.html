<div class="auth-page page">
  <section class="card">
    <h2>{{ 'REGISTER.TITLE' | translate }}</h2>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="success" *ngIf="success">{{ success }}</p>

    <div class="auth-form grid">
      <input [(ngModel)]="nom" type="text" [placeholder]="'COMMON.NAME' | translate" />
      <input [(ngModel)]="email" type="email" [placeholder]="'COMMON.EMAIL' | translate" />
      <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    <div class="form-actions">
      <button (click)="register()">{{ 'REGISTER.SUBMIT' | translate }}</button>
      <a routerLink="/login">{{ 'REGISTER.LOGIN_LINK' | translate }}</a>
    </div>
  </section>
</div>
